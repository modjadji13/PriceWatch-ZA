services:
  postgres:
    image: postgres:16-alpine
    container_name: pricewatchza-postgres
    environment:
      POSTGRES_DB: pricewatchza
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: pricewatch_dev_password
    ports:
      - "5433:5432"
    volumes:
      - pricewatchza_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pricewatchza"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pricewatchza_postgres_data:
